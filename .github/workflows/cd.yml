name: CD (infra deploy)

# AWS OIDC でロールを assume して infra(EvoStack) を東京にデプロイする。
# 事前準備（docs/deploy.md 参照）:
#   - AWS 側に GitHub OIDC プロバイダ + デプロイ用 IAM ロール
#   - GitHub secrets: AWS_DEPLOY_ROLE_ARN, AWS_ACCOUNT_ID
#       （任意）EVO_GITHUB_PAT … incident の PR 作成用 fine-grained PAT。
#         未設定なら incident は diagnosis のみ（PR 機能オフ）。
#         ※ シークレット名に GITHUB_TOKEN は使えない（予約名）ため別名にする。
#   - GitHub variables: BEDROCK_MODEL_ID, AGENT_MANAGED_RUNTIME
#       （任意）INCIDENT_MODEL_ID … incident のモデル上書き（未設定なら BEDROCK_MODEL_ID）。
#       （任意）GITHUB_REPO … 対象リポジトリ（未設定なら sori883/evo）。
#   - CDK bootstrap 済み / Bedrock モデルアクセス有効化済み

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub の Environment protection rule で手動承認を必須にすること
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @evo/shared build

      # CodeZip(node_modules 同梱方式) を組み立てる（infra が agents/chat/deploy を Asset 化）。
      - name: Package agents (CodeZip)
        run: |
          pnpm --filter @evo/agent-chat build
          pnpm --filter @evo/agent-chat --config.node-linker=hoisted deploy --prod --legacy agents/chat/deploy
          rm -rf agents/chat/deploy/node_modules/.bin
          pnpm --filter @evo/agent-report build
          pnpm --filter @evo/agent-report --config.node-linker=hoisted deploy --prod --legacy agents/report/deploy
          rm -rf agents/report/deploy/node_modules/.bin
          pnpm --filter @evo/agent-incident build
          pnpm --filter @evo/agent-incident --config.node-linker=hoisted deploy --prod --legacy agents/incident/deploy
          rm -rf agents/incident/deploy/node_modules/.bin

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: CDK deploy
        working-directory: infra
        run: pnpm exec cdk deploy --require-approval never --outputs-file cdk-outputs.json
        env:
          AWS_REGION: ap-northeast-1
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
          AGENT_MANAGED_RUNTIME: ${{ vars.AGENT_MANAGED_RUNTIME }}
          # incident（未設定なら app.ts 側で既定にフォールバック）
          INCIDENT_MODEL_ID: ${{ vars.INCIDENT_MODEL_ID }}
          GITHUB_REPO: ${{ vars.GITHUB_REPO }}
          # PR 作成用 PAT（予約名回避のため secret 名は EVO_GITHUB_PAT）。未設定=空。
          GITHUB_TOKEN: ${{ secrets.EVO_GITHUB_PAT }}

      - name: Upload stack outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: infra/cdk-outputs.json
