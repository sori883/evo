name: E2E (実 AWS 接続)

# デプロイ済み EvoStack に対して Playwright E2E を実行する。
# 事前準備（docs/deploy.md 参照）:
#   - EvoStack デプロイ済み
#   - GitHub secrets: AWS_E2E_ROLE_ARN, E2E_USER_PASSWORD
#   - GitHub variables: AGENT_RUNTIME_URL, E2E_USER_EMAIL
#   - E2E ロールには CloudFormation 読取 + Cognito 管理(AdminCreateUser/AdminSetUserPassword) 権限

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @evo/shared build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_E2E_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Resolve EvoStack outputs
        id: cfn
        run: |
          POOL=$(aws cloudformation describe-stacks --stack-name EvoStack \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" --output text)
          CLIENT=$(aws cloudformation describe-stacks --stack-name EvoStack \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" --output text)
          echo "pool=$POOL" >> "$GITHUB_OUTPUT"
          echo "client=$CLIENT" >> "$GITHUB_OUTPUT"

      - name: Build web
        run: pnpm --filter @evo/web build
        env:
          AWS_REGION: ap-northeast-1
          COGNITO_USER_POOL_ID: ${{ steps.cfn.outputs.pool }}
          COGNITO_CLIENT_ID: ${{ steps.cfn.outputs.client }}
          AGENT_RUNTIME_URL: ${{ vars.AGENT_RUNTIME_URL }}

      - name: Install Playwright browser
        run: pnpm --filter @evo/web exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm --filter @evo/web e2e
        env:
          AWS_REGION: ap-northeast-1
          COGNITO_USER_POOL_ID: ${{ steps.cfn.outputs.pool }}
          COGNITO_CLIENT_ID: ${{ steps.cfn.outputs.client }}
          AGENT_RUNTIME_URL: ${{ vars.AGENT_RUNTIME_URL }}
          E2E_USER_EMAIL: ${{ vars.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
